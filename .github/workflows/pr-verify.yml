name: PR Verify

on:
  pull_request:
    branches:
      - master

concurrency:
  group: pr-verify-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      # Redact-before-embed boundary + queryRanked trust-filter + forbidden
      # tokens. These were previously orphaned scripts that ran NOWHERE in CI;
      # the embedding-driver lint also now enumerates untracked files so a
      # new direct-importer bypass cannot pass green by staying uncommitted.
      # (The same gates are additionally enforced in-process via test:run.)
      - name: Lint gates
        run: |
          pnpm lint:embedding-driver
          pnpm lint:queryranked
          pnpm check:tokens

      - name: Run tests
        run: pnpm test:run

      - name: Build
        run: pnpm build
